<!DOCTYPE html>
<html lang="en">
<head>

    <title>Netflix</title>
    <link rel="stylesheet" href="layout.css">
</head>
<body>
    <div class="container">
        <h1> NETFLIX</h1>

            <h3> Sign In</h3>
            <input type="text" placeholder="Email or phone number">
            <input type="password" placeholder="Password">

            <div class="check">
                <input type="checkbox">
                <span>Remember me</span>
                <a href="#" >Need Help?</a>
            </div>
            <p> New to Netflix?<b> Sign Up Now</b></p><br>
            <small>This page is protected by Google reCAPTCHA  to ensure you' not a bot. </small>
            <a href="#"> Learn Now </a>
        </div>
    </div>
</body>
</html>
