<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook</title>
<link rel="stylesheet" href="facebook.css">
</head>
<body>
    <div class="container">
        <!-- -------LEFT SECTION------ -->
        <div class="left-side">
            <img class="logo" src="https://www.facebook.com/images/fb_icon_325x325.png">
            <div class="left-content">
                <div>
                <h1> Explore the things
                   <br><span>you love</span>.</h1>
                
                </div>
            <img class="banner" src="image f.webp">
            </div>
        </div>
        <!-- ---------RIGHT SECTION ----- -->
        <div class="right-side">
            <div class="login-box">
            <h3>Log in to Facebook</h3>
            <input type="text" placeholder="Email address or mobile number">
            <input type="password" placeholder="Password">
            <button class="login-btn">Log In</button>
            <a>Forgotten password?</a>
            <hr>
            <button class="create" > Create new Account </button>
            <p> ♾️Meta</p>
            </div>
        </div>
    </div>
</body>
</html>
